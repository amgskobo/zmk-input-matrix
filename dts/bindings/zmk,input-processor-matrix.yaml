description: ZMK Input Processor - Gesture Grid & Flick Recognition

compatible: "zmk,input-processor-matrix"

include: ip_zero_param.yaml

properties:
  rows:
    type: int
    required: true
    description: Number of rows in the gesture grid.
  columns:
    type: int
    required: true
    description: Number of columns in the gesture grid.
  x:
    type: int
    required: true
    description: Maximum X coordinate resolution (range is 0 to x).
  y:
    type: int
    required: true
    description: Maximum Y coordinate resolution (range is 0 to y).
  flick-threshold:
    type: int
    required: true
    description: Minimum displacement in pixels to register a flick gesture.
  suppress-abs:
    type: boolean
    description: |
      If true, consume ABS pointer events (X/Y coordinates) to prevent
      them from reaching other processors or the mouse HID.
  suppress-key:
    type: boolean
    description: |
      If true, consume KEY events (BTN_TOUCH, etc.) to prevent them from
      reaching other processors or behaviors.
  kscan:
    type: phandle
    required: true
    description: Phandle to the zmk,kscan-input-matrix proxy device to report gesture events.
  long-press-ms:
    type: int
    required: false
    default: 300
    description: |
      Milliseconds to hold before triggering a hold (long-press) event.
      Set to 0 to disable hold detection and use tap-only behavior.
